name: release-policy

on:
  pull_request:
    types:
      - opened
      - edited
      - reopened
      - synchronize
      - ready_for_review
      - labeled
      - unlabeled

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  release-policy:
    uses: ./.github/workflows/release-policy.yml
    with:
      pull_request_number: ${{ github.event.pull_request.number }}
