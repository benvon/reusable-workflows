name: quality

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality:
    name: quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run actionlint
        uses: rhysd/actionlint@v1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install yamllint
        run: python -m pip install --disable-pip-version-check yamllint==1.37.1

      - name: Lint YAML
        run: yamllint .
