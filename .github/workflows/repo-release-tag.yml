name: release-tag

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      release_type:
        description: Release bump type
        required: true
        type: choice
        options:
          - major
          - minor
          - patch

permissions:
  contents: write
  pull-requests: read

jobs:
  release-tag:
    uses: ./.github/workflows/release-tag.yml
    with:
      caller_event_name: ${{ github.event_name }}
      caller_sha: ${{ github.sha }}
      manual_release_type: ${{ inputs.release_type || '' }}
