name: docker-image-release

on:
  workflow_call:
    inputs:
      build_context:
        required: false
        type: string
        default: .
      dockerfile:
        required: false
        type: string
        default: Dockerfile
      platforms:
        required: false
        type: string
        default: linux/amd64
      build_args:
        required: false
        type: string
        default: ""
      image_name:
        required: false
        type: string
        default: ""
      create_github_release:
        required: false
        type: boolean
        default: true

jobs:
  release:
    name: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Resolve image name
        id: image
        run: |
          if [[ -n "${{ inputs.image_name }}" ]]; then
            echo "name=${{ inputs.image_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=ghcr.io/${GITHUB_REPOSITORY}" >> "$GITHUB_OUTPUT"
          fi

      - name: Determine latest-tag policy
        id: latest
        run: |
          if [[ "${GITHUB_REF_NAME}" == *-* ]]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ steps.latest.outputs.enabled }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.build_context }}
          file: ${{ inputs.dockerfile }}
          platforms: ${{ inputs.platforms }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ inputs.build_args }}

      - name: Create GitHub release
        if: inputs.create_github_release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
