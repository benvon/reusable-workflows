name: go-quality

on:
  workflow_call:
    inputs:
      go_version_file:
        required: false
        type: string
        default: go.mod
      working_directory:
        required: false
        type: string
        default: .
      quality_command:
        required: true
        type: string
      coverage_file:
        required: false
        type: string
        default: ""
      upload_codecov:
        required: false
        type: boolean
        default: false
      codecov_flags:
        required: false
        type: string
        default: ""
      codecov_name:
        required: false
        type: string
        default: ""

jobs:
  quality:
    name: quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: ${{ inputs.go_version_file }}
          cache: true
          cache-dependency-path: ${{ inputs.working_directory }}/go.sum

      - name: Install CI helper tools
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Add Go tool bin directory to PATH
        run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Run quality command
        run: ${{ inputs.quality_command }}

      - name: Upload coverage to Codecov
        if: inputs.upload_codecov && inputs.coverage_file != ''
        uses: codecov/codecov-action@v6
        with:
          files: ${{ inputs.working_directory }}/${{ inputs.coverage_file }}
          flags: ${{ inputs.codecov_flags }}
          name: ${{ inputs.codecov_name }}
